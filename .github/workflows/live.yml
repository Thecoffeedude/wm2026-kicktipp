name: WM 2026 – Live-Spielstände

on:
  schedule:
    # Nur während der WM-2026-Spielfenster (Nordamerika): Kickoffs liegen
    # ca. 16:00–03:00 UTC, mit Nachspielzeit bis ~05:00 UTC.
    - cron: '*/5 15-23 * * *'
    - cron: '*/5 0-5 * * *'
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Nur ausführen wenn der API-Key gesetzt ist
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Live-Spielstände abrufen → docs/live.json + docs/results.json
        # Bricht nicht ab wenn kein API-Key gesetzt (fetch_live gibt [] zurück).
        # Schreibt bewusst NICHT in docs/data.json — kein Rebase-Konflikt mit predict.yml.
        run: python3 src/live_update.py

      - name: Live-Daten committen (nur bei tatsächlichen Änderungen)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/live.json docs/results.json
          git diff --staged --quiet && echo "Keine Änderungen." || \
            git commit -m "chore: Live $(date -u +'%H:%M UTC')"
          git pull --rebase && git push
