name: WM 2026 – Quoten-Capture (kickoff-anchored)

# Leichtgewichtiger Capture-Lauf OHNE Playwright. Spendet Odds-API-Credits nur,
# wenn ein Spiel in einem noch nicht erfassten Offset-Fenster liegt (T-24h / T-3h /
# Schlussquote). Eine API-Abfrage deckt alle aktuell anstehenden Spiele ab.
on:
  schedule:
    # Alle 30 Min in den relevanten Stunden (Kickoffs ~15:00–03:00 UTC; deckt
    # auch T-3h der frühen und T-24h-Fenster ab).
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-5 * * *'
  workflow_dispatch:

# Nur ein Capture-Lauf gleichzeitig (append-only Store, kein Race).
concurrency:
  group: odds-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Quoten-Snapshot erfassen (nur bei fälligem Fenster)
        # Ohne ODDS_API_KEY wird der Schritt übersprungen (kein Capture möglich).
        if: env.ODDS_API_KEY != ''
        run: python3 src/odds_capture.py

      - name: Snapshots committen (nur bei Änderungen)
        if: env.ODDS_API_KEY != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl data/odds_budget.json docs/odds_latest.json
          git diff --staged --quiet && echo "Keine neuen Snapshots." || \
            git commit -m "chore: Quoten-Snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push
