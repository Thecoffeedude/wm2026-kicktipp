name: WM 2026 – Vorhersagen aktualisieren

on:
  schedule:
    # Täglich 06:00 UTC — Puffer vor Kickoff-Deadlines (i.d.R. 17:00–21:00 MESZ)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manueller Trigger (jederzeit per UI oder gh CLI)

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nötig für git push am Ende

    # KICKTIPP_EMAIL wird hier gesetzt, damit Folge-Schritte darauf prüfen können
    # ob die Kicktipp-Secrets konfiguriert sind (leerer String = nicht gesetzt).
    env:
      KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Vorhersagen generieren → docs/data.json
        # uanalyse wird per HTTP gezogen (kein Secret nötig).
        # Markt-Quoten kommen aus docs/odds_latest.json (vom Capture-Workflow) —
        # build_data ruft die Odds-API NICHT mehr selbst auf (spart Credits).
        # FOOTBALL_DATA_API_KEY ist optional — liefert exakte Anstoßzeiten + Ergebnisse.
        run: python3 src/build_data.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Daten committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/live.json docs/results.json
          git diff --staged --quiet && echo "Keine Änderungen." || \
            git commit -m "chore: Vorhersagen $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push

      - name: Tages-Tipps per ntfy senden
        if: env.NTFY_TOPIC != ''
        run: python3 src/notify_tips.py

      # Der Kicktipp-Auto-Submit ist in einen eigenen, deadline-ankernden
      # Workflow ausgelagert: .github/workflows/submit.yml (Zwei-Pass).
      # predict.yml baut nur noch die Daten und sendet die Tages-Übersicht.
