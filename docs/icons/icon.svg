<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#222838"/>
      <stop offset="100%" stop-color="#10131A"/>
    </radialGradient>
    <!-- bar gradients using app semantic colours -->
    <linearGradient id="gH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BBEFF"/>
      <stop offset="100%" stop-color="#3FA9FF"/>
    </linearGradient>
    <linearGradient id="gM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A89BFF"/>
      <stop offset="100%" stop-color="#8A7BFF"/>
    </linearGradient>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="100%" stop-color="#FF9F2E"/>
    </linearGradient>
    <!-- subtle inner glow on ball -->
    <radialGradient id="ballG" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D8F0"/>
    </radialGradient>
    <!-- drop shadow filter -->
    <filter id="ds" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <!-- background rounded rect (for non-maskable, matches iOS icon shape) -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- subtle top highlight -->
  <ellipse cx="256" cy="-30" rx="280" ry="140" fill="#FFFFFF" opacity=".04"/>

  <!-- baseline -->
  <line x1="96" y1="432" x2="416" y2="432" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity=".12"/>

  <!-- bars: home (2nd place), middle (1st/winner), away (3rd place) -->
  <!-- 2nd place: left, medium height, blue -->
  <rect x="100" y="258" width="82" height="174" rx="36" fill="url(#gH)" filter="url(#ds)"/>
  <!-- 1st place: centre, tallest, purple -->
  <rect x="215" y="164" width="82" height="268" rx="36" fill="url(#gM)" filter="url(#ds)"/>
  <!-- 3rd place: right, shortest, orange -->
  <rect x="330" y="258" width="82" height="174" rx="36" fill="url(#gA)" filter="url(#ds)"/>

  <!-- football on top of the winning (centre) bar -->
  <circle cx="256" cy="118" r="62" fill="url(#ballG)" filter="url(#ds)"/>
  <!-- pentagon patch pattern -->
  <g stroke="#1A1E2C" stroke-width="5.5" fill="none" opacity=".22">
    <polygon points="256,72 270,92 262,112 250,112 242,92"/>
    <line x1="256" y1="72" x2="242" y2="58"/>
    <line x1="270" y1="92" x2="286" y2="88"/>
    <line x1="262" y1="112" x2="270" y2="128"/>
    <line x1="250" y1="112" x2="242" y2="128"/>
    <line x1="242" y1="92" x2="226" y2="88"/>
  </g>
</svg>
