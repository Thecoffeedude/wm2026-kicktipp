<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA / iOS installability -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tipps">

  <!-- theme-color: light / dark -->
  <meta name="theme-color" content="#EAF0F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0A0C12" media="(prefers-color-scheme: dark)">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

  <link rel="manifest" href="./manifest.json">

  <title>WM 2026 · Kicktipp-Prädikator</title>
  <meta name="description" content="EV-optimale Kicktipp-Tipps für die WM 2026 — basierend auf uanalyse-Prognosen und Buchmacher-Quoten.">

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="wrap">
      <div class="head glass">
        <h1>WM 2026 <span class="sub">Tipps</span></h1>
        <div class="head-right">
          <div id="meta" class="sync"></div>
          <button id="theme-toggle" class="theme-toggle" aria-label="Design wechseln" title="Design: automatisch">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap" id="app">
    <div class="loading">Lade Tipps…</div>
  </main>

  <!-- Install banner: shown by app.js based on platform detection -->
  <div id="install-banner" class="install-banner" hidden aria-live="polite">
    <span class="install-banner__text" id="install-banner-text">App installieren</span>
    <button class="install-banner__close" aria-label="Schließen" onclick="dismissInstallBanner()">✕</button>
  </div>

  <!-- iOS Safari install sheet (slides up on tap) -->
  <div id="ios-install-sheet" class="ios-sheet" hidden aria-modal="true" role="dialog" aria-label="App installieren">
    <div class="ios-sheet__backdrop" onclick="closeIOSSheet()"></div>
    <div class="ios-sheet__body">
      <div class="ios-sheet__handle"></div>
      <h2 class="ios-sheet__title">App installieren</h2>
      <div class="ios-sheet__steps">
        <div class="ios-sheet__step">
          <span class="ios-sheet__num">1</span>
          <span>Tippe auf das <strong>Teilen-Symbol</strong>
            <svg class="ios-sheet__share-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M16 5l-4-4-4 4M12 1v14"/>
            </svg>
            in der Safari-Leiste</span>
        </div>
        <div class="ios-sheet__step">
          <span class="ios-sheet__num">2</span>
          <span>Wähle <strong>„Zum Home-Bildschirm"</strong></span>
        </div>
        <div class="ios-sheet__step">
          <span class="ios-sheet__num">3</span>
          <span>Tippe oben rechts auf <strong>„Hinzufügen"</strong></span>
        </div>
      </div>
      <button class="ios-sheet__close" onclick="closeIOSSheet()">Schließen</button>
    </div>
  </div>

  <nav aria-label="Hauptnavigation">
    <div class="tabs glass" role="tablist">
      <button class="tab active" id="tab-heute" role="tab" aria-selected="true"
              onclick="setTab('heute')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
        Heute
      </button>
      <button class="tab" id="tab-alle" role="tab" aria-selected="false"
              onclick="setTab('alle')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
        Spiele
      </button>
      <button class="tab" id="tab-gruppen" role="tab" aria-selected="false"
              onclick="setTab('gruppen')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        Gruppen
      </button>
      <button class="tab" id="tab-baum" role="tab" aria-selected="false"
              onclick="setTab('baum')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
        Turnier
      </button>
      <button class="tab" id="tab-verlauf" role="tab" aria-selected="false"
              onclick="setTab('verlauf')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
        Verlauf
      </button>
      <button class="tab" id="tab-modell" role="tab" aria-selected="false"
              onclick="setTab('modell')">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9m5 10V5m5 14v-7m5 7v-11"/></svg>
        Info
      </button>
    </div>
  </nav>

  <footer class="site-footer">
    Forecast: <a href="https://github.com/uanalyse/world-cup-2026-predictions" target="_blank" rel="noopener">uanalyse</a>,
    <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    · Quoten: <a href="https://the-odds-api.com" target="_blank" rel="noopener">The Odds API</a>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
